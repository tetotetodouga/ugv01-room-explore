slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /ldlidar_node/scan
    scan_queue_size: 1
    resolution: 0.05
    transform_publish_period: 0.02
    map_update_interval: 0.5
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
